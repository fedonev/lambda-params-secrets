# Post-release update of the stable branch
name: Push to [stable]

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to merge into stable
        required: true
        type: string

permissions:
  contents: write

jobs:
  push-to-stable:
    name: Push to [stable]
    environment: stable
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7 # https://github.com/actions/checkout
        with:
          fetch-depth: 0
      - name: Merge
        run: |
          git fetch origin stable
          git switch --create stable --track origin/stable
          git merge "$RELEASE_TAG" --ff-only
          git push origin stable
