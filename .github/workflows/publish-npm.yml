# Post-release Publish package to npm
# https://docs.npmjs.com/trusted-publishers#step-2-configure-your-cicd-workflow
name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

# Allow one concurrent deployment
concurrency:
  group: npm
  cancel-in-progress: true

permissions:
  id-token: write # Required for OIDC npm trusted publishing
  contents: read

jobs:
  publish-npm:
    name: Publish to npm
    environment: stable
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6 # https://github.com/actions/checkout
      - name: Setup
        uses: actions/setup-node@v6 # https://github.com/actions/setup-node
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false
      - run: npm ci
      - run: npm run build
      - run: npm test
      - name: Prepare dist
        run: |
          npx tsc --project tsconfig.dist.json
          cp README.md CHANGELOG.md LICENSE ./dist
          jq 'del(.devDependencies) | del(.scripts)' package.json > ./dist/package.json
      - name: Publish
        working-directory: dist
        run: npm publish
